openapi: 3.0.1
info:
  title: User Registration API
  version: 1.0.0
paths:
  /api/users:
    post:
      summary: Create a new user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                age:
                  type: integer
                  minimum: 18
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  email:
                    type: string
        '400':
          description: Validation error
        '409':
          description: Email already exists
